name: Test CLI action

on: 
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  cli-action:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install CLI
      uses: dopplerhq/cli-action@v4
    - name: Test CLI
      run: doppler --version